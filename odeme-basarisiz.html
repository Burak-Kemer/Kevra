<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödeme Başarısız | KEVRA</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #f8f8f6; min-height: 100vh; display: flex; flex-direction: column; }
        .fail-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }
        .fail-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.08);
            padding: 60px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .fail-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 38px;
        }
        .fail-card h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        .fail-card p {
            color: #666;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 8px;
        }
        .btn-retry {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 36px;
            background: #1a1a1a;
            color: #fff;
            border-radius: 50px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-retry:hover { background: #c9a87c; }
        .btn-home {
            display: inline-block;
            margin-top: 12px;
            padding: 12px 30px;
            border: 1.5px solid #ddd;
            color: #555;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            margin-left: 10px;
            transition: all 0.2s;
        }
        .btn-home:hover { border-color: #1a1a1a; color: #1a1a1a; }
        @media (max-width: 480px) {
            .fail-card { padding: 40px 24px; }
            .btn-retry, .btn-home { display: block; margin: 10px 0 0; }
        }
    </style>
</head>
<body>
    <div class="fail-container">
        <div class="fail-card">
            <div class="fail-icon">✕</div>
            <h1>Ödeme Başarısız</h1>
            <p>Ödeme işleminiz tamamlanamadı. Kart bilgilerinizi kontrol edip tekrar deneyebilirsiniz.</p>
            <p>Sorun devam ederse bankanızla iletişime geçiniz. Hesabınızdan herhangi bir ücret alınmadı.</p>
            <div>
                <a href="odeme.html" class="btn-retry">Tekrar Dene</a>
                <a href="index.html" class="btn-home">Ana Sayfaya Dön</a>
            </div>
        </div>
    </div>

    <script>
        try { window.parent.postMessage({ paytr: 'fail' }, 'https://kevra.com.tr'); } catch(e) {}
    </script>
</body>
</html>
